<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitio estatico - Azure Storage</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <main class="container">
    <h1>Demo: Web estatica en Azure Storage Account</h1>
    <p>Este sitio se compila con Vite y se despliega en un contenedor
       <code>$web</code> de una Storage Account con hosting estatico habilitado.</p>

    <section class="card">
      <h2>Calculadora de descuento</h2>
      <label for="price">Precio (EUR)</label>
      <input id="price" type="number" value="100" min="0" step="0.01" />

      <label for="discount">Descuento (%)</label>
      <input id="discount" type="number" value="15" min="0" max="100" step="1" />

      <button id="calc-btn">Calcular</button>
      <p id="result" class="result"></p>
    </section>

    <footer>
      <small id="build-info"></small>
    </footer>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
